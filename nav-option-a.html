<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option A - Hamburger Dropdown</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #F2F2F2; }

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 16px 24px;
  background: rgba(242, 242, 242, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: #000;
}

.logo-icon { width: 28px; height: 28px; }
.logo-text { font-size: 18px; font-weight: 400; letter-spacing: 0.05em; }

.nav-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 8px;
  background: #000;
  color: #fff;
  border-radius: 4px;
  margin-left: 8px;
}

.hamburger {
  width: 32px;
  height: 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
}

.hamburger span {
  width: 24px;
  height: 2px;
  background: #000;
  border-radius: 2px;
}

.mobile-menu {
  background: #fff;
  border-radius: 12px;
  margin-top: 16px;
  padding: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.mobile-menu a {
  display: block;
  padding: 14px 0;
  color: #737373;
  text-decoration: none;
  font-size: 15px;
  border-bottom: 1px solid #eee;
}

.mobile-menu a:last-of-type { border-bottom: none; }

.mobile-menu .cta {
  display: block;
  margin-top: 16px;
  padding: 14px;
  background: #3B82F6;
  color: #fff;
  text-align: center;
  border-radius: 32px;
  font-weight: 500;
}

.label {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: #000;
  color: #fff;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="logo">
      <svg class="logo-icon" viewBox="0 0 100 100">
        <rect x="10" y="15" width="80" height="14" fill="black"/>
        <rect x="10" y="38" width="80" height="14" fill="black"/>
        <rect x="38" y="62" width="24" height="24" fill="black"/>
      </svg>
      <span class="logo-text">tend</span>
      <span class="nav-tag">AI OPS</span>
    </a>
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  
  <div class="mobile-menu">
    <a href="#features">Features</a>
    <a href="#how">How it works</a>
    <a href="#pricing">Pricing</a>
    <a href="#meetup">DFW Meetup</a>
    <a href="#" class="cta">Book a Discovery Call</a>
  </div>
</nav>

<div class="label">Option A: Hamburger → Dropdown Menu</div>

</body>
</html>
