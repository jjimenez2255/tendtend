<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option C - CTA Only</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #F2F2F2; }

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 16px 24px;
  background: rgba(242, 242, 242, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: #000;
}

.logo-icon { width: 28px; height: 28px; }
.logo-text { font-size: 18px; font-weight: 400; letter-spacing: 0.05em; }

.nav-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 8px;
  background: #000;
  color: #fff;
  border-radius: 4px;
  margin-left: 8px;
}

.nav-cta {
  padding: 10px 20px;
  background: #000;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  border-radius: 8px;
}

.content {
  padding: 120px 24px 40px;
  text-align: center;
}

.content p {
  color: #737373;
  margin-top: 16px;
  font-size: 15px;
  line-height: 1.6;
}

.label {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: #000;
  color: #fff;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="logo">
      <svg class="logo-icon" viewBox="0 0 100 100">
        <rect x="10" y="15" width="80" height="14" fill="black"/>
        <rect x="10" y="38" width="80" height="14" fill="black"/>
        <rect x="38" y="62" width="24" height="24" fill="black"/>
      </svg>
      <span class="logo-text">tend</span>
      <span class="nav-tag">AI OPS</span>
    </a>
    <a href="#" class="nav-cta">Book a Call</a>
  </div>
</nav>

<div class="content">
  <h2>Clean & Simple</h2>
  <p>No hamburger menu needed. One CTA focus. Users scroll to discover sections — the page is designed for vertical flow anyway.</p>
</div>

<div class="label">Option C: Just CTA, No Menu (Simplest)</div>

</body>
</html>
