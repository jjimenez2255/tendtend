<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option B - Fullscreen Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; }

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: #fff;
}

.logo-icon { width: 28px; height: 28px; }
.logo-text { font-size: 18px; font-weight: 400; letter-spacing: 0.05em; }

.nav-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 8px;
  background: #fff;
  color: #000;
  border-radius: 4px;
  margin-left: 8px;
}

.close {
  font-size: 32px;
  color: #fff;
  cursor: pointer;
}

.fullscreen-menu {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 24px;
  padding: 24px;
}

.fullscreen-menu a {
  color: #fff;
  text-decoration: none;
  font-size: 28px;
  font-weight: 400;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.fullscreen-menu a:hover { opacity: 1; }

.fullscreen-menu .cta {
  margin-top: 24px;
  padding: 16px 40px;
  background: #3B82F6;
  color: #fff;
  border-radius: 32px;
  font-size: 16px;
  font-weight: 500;
  opacity: 1;
}

.label {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: #fff;
  color: #000;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <svg class="logo-icon" viewBox="0 0 100 100">
      <rect x="10" y="15" width="80" height="14" fill="white"/>
      <rect x="10" y="38" width="80" height="14" fill="white"/>
      <rect x="38" y="62" width="24" height="24" fill="white"/>
    </svg>
    <span class="logo-text">tend</span>
    <span class="nav-tag">AI OPS</span>
  </a>
  <div class="close">✕</div>
</nav>

<div class="fullscreen-menu">
  <a href="#features">Features</a>
  <a href="#how">How it works</a>
  <a href="#pricing">Pricing</a>
  <a href="#meetup">DFW Meetup</a>
  <a href="#" class="cta">Book a Discovery Call</a>
</div>

<div class="label">Option B: Fullscreen Overlay Menu</div>

</body>
</html>
