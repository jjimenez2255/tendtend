<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #FAFAF8 0%, #F0EFEB 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 100px;
}
.logo {
  font-size: 28px;
  font-weight: 600;
  color: #1A1A1A;
  letter-spacing: -0.5px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.badge {
  font-size: 11px;
  font-weight: 600;
  color: #2A5CFF;
  background: rgba(42,92,255,0.1);
  padding: 6px 14px;
  border-radius: 100px;
  letter-spacing: 0.5px;
}
h1 {
  font-size: 72px;
  font-weight: 600;
  color: #1A1A1A;
  letter-spacing: -2px;
  line-height: 1.1;
  margin-bottom: 24px;
}
p {
  font-size: 28px;
  color: #5A5A5A;
  font-weight: 400;
}
.url {
  position: absolute;
  bottom: 60px;
  left: 100px;
  font-size: 20px;
  color: #2A5CFF;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="logo">
  tend <span class="badge">AI OPS</span>
</div>
<h1>Fractional AI<br>Operations</h1>
<p>We show up and build. 24/7 automation, managed for you.</p>
<div class="url">tend.team</div>
</body>
</html>
